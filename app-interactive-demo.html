<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NutriSmart Formula Maker App Demo</title>
<style>
/* ===== Reset ===== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemSystem,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:14px;color:#2D3436;overflow:hidden;}

/* ===== Color Palette - Western / Overseas Style ===== */
:root{
  --primary:#2D3436; --accent:#8B6914; --accent-light:#C4A35A;
  --bg:#FDF8F3; --bg-warm:#FAF5EE; --text:#2D3436; --text-secondary:#636E72;
  --white:#FFFFFF; --green:#27AE60; --red:#E74C3C; --orange:#E67E22;
  --blue:#2980B9; --line:#E8E2DA; --card-shadow:0 1px 4px rgba(0,0,0,.06);
  --radius:16px; --radius-sm:12px; --radius-xs:8px;
}

/* ===== Three-Column Layout ===== */
.app{display:grid;grid-template-columns:270px 1fr 360px;height:100vh;min-width:1180px;background:#F0EBE3;}
.sidebar-left{background:#2D3436;color:#fff;overflow-y:auto;}
.stage{display:flex;align-items:center;justify-content:center;background:#EDE7DD;overflow:hidden;position:relative;}
.sidebar-right{background:#fff;border-left:1px solid var(--line);overflow-y:auto;}

/* ===== Left Sidebar ===== */
.logo{padding:20px 18px 14px;font-size:17px;font-weight:700;color:var(--accent-light);border-bottom:1px solid rgba(255,255,255,.1);position:sticky;top:0;background:#2D3436;z-index:5;}
.logo small{display:block;font-size:10px;color:rgba(255,255,255,.4);font-weight:400;margin-top:3px;letter-spacing:.3px;}
.tree{padding:8px 0;}
.tree-module{margin-top:6px;}
.tree-module-title{padding:8px 18px 4px;font-size:10px;color:rgba(255,255,255,.35);font-weight:700;text-transform:uppercase;letter-spacing:.8px;cursor:pointer;user-select:none;}
.tree-item{padding:9px 18px 9px 24px;font-size:13px;color:#B2BEC3;cursor:pointer;display:flex;align-items:center;gap:8px;border-left:3px solid transparent;transition:background .15s;}
.tree-item:hover{background:rgba(255,255,255,.06);}
.tree-item.active{background:rgba(139,105,20,.15);border-left-color:var(--accent-light);color:#fff;font-weight:600;}
.tree-num{font-size:10px;color:rgba(255,255,255,.25);width:16px;}
.tree-tag{font-size:9px;padding:1px 6px;border-radius:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.tag-l1{background:rgba(255,255,255,.15);color:#DFE6E9;}
.tag-l2{background:rgba(139,105,20,.5);color:#FFEAA7;}
.tag-l3{background:var(--accent);color:#fff;}
.tag-l4{background:linear-gradient(135deg,#E67E22,#F39C12);color:#fff;}
.tag-l5{background:linear-gradient(135deg,#8E44AD,#9B59B6);color:#fff;}
.tag-entry{background:#27AE60;color:#fff;}

/* ===== iPhone Frame ===== */
.iphone-wrap{transform-origin:center center;}
.iphone{width:375px;height:760px;background:#1a1a1a;border-radius:50px;padding:11px;box-shadow:0 0 0 2px #333,0 30px 70px rgba(0,0,0,.35),inset 0 0 4px rgba(255,255,255,.07);position:relative;}
.screen{width:100%;height:100%;background:var(--bg);border-radius:40px;overflow:hidden;position:relative;display:flex;flex-direction:column;}
.notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:148px;height:28px;background:#1a1a1a;border-radius:0 0 20px 20px;z-index:50;}
.home-indicator{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);width:126px;height:5px;background:rgba(255,255,255,.45);border-radius:3px;z-index:50;}

/* ===== Screen Internals ===== */
.status-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 28px 0 32px;font-size:13px;font-weight:600;color:#000;flex-shrink:0;z-index:10;position:relative;}
.status-bar .sb-right{display:flex;align-items:center;gap:5px;}
.sb-icon{width:16px;height:11px;}
.nav-bar{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--white);color:var(--primary);flex-shrink:0;border-bottom:1px solid var(--line);}
.nav-bar .nav-title{font-size:17px;font-weight:600;}
.nav-bar .nav-back{font-size:22px;cursor:pointer;width:36px;display:flex;align-items:center;justify-content:center;color:var(--primary);}
.nav-bar .nav-right{font-size:15px;cursor:pointer;width:36px;text-align:right;display:flex;align-items:center;justify-content:center;gap:4px;}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.content::-webkit-scrollbar{width:0;}

/* ===== Tab Bar (Device Hub only) ===== */
.tab-bar{height:73px;display:flex;align-items:flex-start;justify-content:space-around;padding-top:8px;background:rgba(255,255,255,.97);border-top:1px solid var(--line);flex-shrink:0;}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--text-secondary);cursor:pointer;width:60px;}
.tab.active{color:var(--accent);}
.tab-icon{font-size:20px;line-height:1;}
.tab-mid{position:relative;margin-top:-18px;}
.tab-mid-circle{width:48px;height:48px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:300;box-shadow:0 4px 12px rgba(139,105,20,.35);border:4px solid #fff;}

/* ===== Common Components ===== */
.card{background:var(--white);border-radius:var(--radius-sm);margin:10px 14px;padding:14px;box-shadow:var(--card-shadow);}
.card-flat{background:var(--white);border-radius:var(--radius-sm);padding:14px;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 22px;border-radius:24px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s;}
.btn:active{opacity:.75;}
.btn-accent{background:var(--accent);color:#fff;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--accent);color:var(--accent);}
.btn-outline-gray{background:transparent;border:1.5px solid #CCC;color:var(--text-secondary);}
.btn-success{background:var(--green);color:#fff;}
.btn-sm{padding:7px 15px;font-size:12px;border-radius:18px;}
.btn-block{display:block;width:100%;}
.pill{display:inline-block;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;}
.pill-blue{background:#EBF5FB;color:var(--blue);}
.pill-orange{background:#FEF5E7;color:var(--orange);}
.pill-green{background:#EAFAF1;color:var(--green);}
.pill-red{background:#FDEDEC;color:var(--red);}
.pill-beta{background:var(--orange);color:#fff;}
.pill-v3{background:linear-gradient(135deg,#8E44AD,#9B59B6);color:#fff;}
.section-title{font-size:12px;color:var(--text-secondary);font-weight:700;padding:14px 16px 6px;text-transform:uppercase;letter-spacing:.5px;}
.row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;}
.divider{height:1px;background:var(--line);margin:8px 0;}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;background:var(--white);border-bottom:1px solid #F5F2EC;}
.list-item:last-child{border-bottom:none;}

/* ===== Device List Page Styles ===== */
.dev-list-header{padding:20px 16px 12px;}
.dev-list-header h2{font-size:22px;font-weight:700;color:var(--primary);}
.dev-list-header p{font-size:13px;color:var(--text-secondary);margin-top:3px;}
.dev-card{background:var(--white);border-radius:var(--radius);margin:10px 14px;padding:16px;box-shadow:var(--card-shadow);cursor:pointer;transition:transform .15s,border-color .15s;border:2px solid transparent;}
.dev-card:active{transform:scale(.98);}
.dev-card.selected{border-color:var(--accent);}
.dev-card-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.dev-icon{width:48px;height:48px;border-radius:14px;background:var(--bg-warm);display:flex;align-items:center;justify-content:center;font-size:24px;}
.dev-info{flex:1;}
.dev-name{font-size:15px;font-weight:700;color:var(--primary);}
.dev-status{font-size:12px;color:var(--green);margin-top:2px;display:flex;align-items:center;gap:4px;}
.dev-status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.dev-stats{display:flex;gap:12px;}
.dev-stat{text-align:center;flex:1;}
.dev-stat-val{font-size:16px;font-weight:700;color:var(--primary);}
.dev-stat-label{font-size:10px;color:var(--text-secondary);margin-top:1px;}
.add-device-btn{margin:14px;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border:2px dashed #CCC;border-radius:var(--radius);color:var(--text-secondary);font-size:14px;font-weight:600;cursor:pointer;background:transparent;}
.add-device-btn:active{background:var(--bg);}

/* ===== Device Dashboard (Reference Layout) Styles ===== */
.ddash-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 0;}
.ddash-icon-btn{width:38px;height:38px;border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 1px 4px rgba(0,0,0,.08);cursor:pointer;}
.ddash-device-area{display:flex;flex-direction:column;align-items:center;padding:10px 0 4px;position:relative;}
.ddash-device-img{width:160px;height:180px;border-radius:20px;background:linear-gradient(145deg,#E8E2D8,#DDD5C8);display:flex;align-items:center;justify-content:center;font-size:64px;position:relative;}
.ddash-float-stat{position:absolute;padding:6px 12px;border-radius:20px;background:var(--white);box-shadow:0 2px 8px rgba(0,0,0,.1);display:flex;align-items:center;gap:5px;font-size:13px;font-weight:700;z-index:2;}
.ddash-float-stat.left{left:-10px;top:45%;}
.ddash-float-stat.right{right:-10px;top:45%;}
.ddash-lock{position:absolute;left:12px;top:55%;width:34px;height:34px;border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 1px 4px rgba(0,0,0,.08);z-index:2;}
.ddash-toggle{display:flex;background:var(--white);border-radius:28px;padding:3px;margin:12px 14px 0;box-shadow:var(--card-shadow);}
.ddash-toggle-item{flex:1;text-align:center;padding:9px 0;border-radius:25px;font-size:14px;font-weight:600;cursor:pointer;color:var(--text-secondary);transition:all .2s;}
.ddash-toggle-item.active{background:var(--accent);color:#fff;}
.ddash-brand-card{background:var(--white);border-radius:var(--radius-sm);margin:10px 14px;padding:14px;box-shadow:var(--card-shadow);display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.ddash-brand-info{}
.ddash-brand-name{font-size:16px;font-weight:700;color:var(--primary);}
.ddash-brand-detail{font-size:12px;color:var(--text-secondary);margin-top:2px;}
.ddash-stepper-card{background:var(--white);border-radius:var(--radius-sm);margin:8px 14px;padding:14px;box-shadow:var(--card-shadow);}
.ddash-stepper-label{font-size:14px;color:var(--text-secondary);display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.ddash-stepper{display:flex;align-items:center;justify-content:space-between;}
.ddash-stepper-btn{width:42px;height:42px;border-radius:50%;background:var(--bg);border:none;font-size:22px;font-weight:300;color:var(--primary);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ddash-stepper-btn:active{background:var(--line);}
.ddash-stepper-val{font-size:22px;font-weight:700;color:var(--primary);}
.ddash-hint{font-size:12px;color:var(--text-secondary);text-align:center;margin-top:6px;}
.ddash-temp-row{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;}
.ddash-temp-label{font-size:14px;color:var(--text-secondary);display:flex;align-items:center;gap:6px;}
.ddash-bottom-bar{display:flex;align-items:center;gap:12px;padding:14px 14px 20px;}
.ddash-power-btn{width:52px;height:52px;border-radius:50%;background:var(--white);border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--text-secondary);cursor:pointer;flex-shrink:0;box-shadow:var(--card-shadow);}
.ddash-start-btn{flex:1;height:52px;border-radius:26px;background:var(--accent);color:#fff;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;box-shadow:0 4px 16px rgba(139,105,20,.3);}
.ddash-start-btn:active{opacity:.85;}

/* ===== Brew Page ===== */
.brew-step{font-size:12px;color:var(--text-secondary);padding:14px 16px 4px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
.brew-preset{display:flex;gap:10px;padding:0 14px;overflow-x:auto;}
.brew-preset-card{min-width:108px;background:var(--white);border-radius:var(--radius-xs);padding:14px;text-align:center;border:2px solid transparent;cursor:pointer;box-shadow:var(--card-shadow);}
.brew-preset-card.sel{border-color:var(--accent);background:#FEFBF3;}
.brew-preset-card .oz{font-size:22px;font-weight:700;color:var(--primary);}
.brew-param{display:flex;justify-content:space-between;padding:9px 0;font-size:13px;border-bottom:1px solid #F5F2EC;}
.brew-confirm{padding:18px 14px;}
.brew-anim{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;text-align:center;}
.brew-ring{width:160px;height:160px;position:relative;margin-bottom:16px;}
.brew-ring-bg{fill:none;stroke:#E8E2D8;stroke-width:8;}
.brew-ring-fg{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset .3s;}
.brew-ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.brew-ring-text .g{font-size:24px;font-weight:700;color:var(--primary);}
.brew-ring-text .l{font-size:11px;color:var(--text-secondary);}
.brew-done{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;}
.brew-done-check{width:80px;height:80px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:20px;}

/* ===== Scan Page ===== */
.scan-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a1a;position:relative;overflow:hidden;}
.scan-frame{width:220px;height:120px;border:2px solid var(--accent);border-radius:8px;position:relative;z-index:2;}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scanMove 2s ease-in-out infinite;z-index:3;}
@keyframes scanMove{0%,100%{top:0;}50%{top:calc(100% - 2px);}}
.scan-hint{color:#fff;font-size:13px;margin-top:20px;z-index:2;}
.scan-bottom{padding:16px;text-align:center;background:#1a1a1a;color:var(--accent);font-size:13px;cursor:pointer;}

/* ===== Record Page ===== */
.rec-day{font-size:13px;font-weight:700;color:var(--primary);padding:12px 16px 6px;}
.rec-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--white);border-bottom:1px solid #F5F2EC;cursor:pointer;}
.rec-time{font-size:12px;color:var(--text-secondary);width:42px;flex-shrink:0;}
.rec-amount{font-size:15px;font-weight:600;color:var(--primary);width:50px;}
.rec-dev{font-size:11px;flex:1;color:var(--text-secondary);}
.rec-badge{font-size:10px;padding:2px 6px;border-radius:8px;}

/* ===== Inventory Page ===== */
.inv-ring-wrap{display:flex;align-items:center;gap:16px;}
.inv-bar{display:flex;align-items:flex-end;gap:6px;height:60px;padding:0 4px;}
.inv-bar-col{flex:1;background:var(--accent);border-radius:3px 3px 0 0;opacity:.65;min-height:4px;}

/* ===== Growth Chart Page ===== */
.growth-seg{display:flex;margin:0 14px;background:#EEE9E0;border-radius:8px;padding:2px;}
.growth-seg-item{flex:1;text-align:center;padding:7px;font-size:12px;color:var(--text-secondary);border-radius:6px;cursor:pointer;}
.growth-seg-item.sel{background:var(--white);color:var(--primary);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.06);}

/* ===== Accuracy Report ===== */
.dev-bar{display:flex;align-items:center;gap:6px;height:80px;}
.dev-bar-col{flex:1;border-radius:3px 3px 0 0;min-height:6px;position:relative;}
.dev-bar-val{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--text-secondary);}

/* ===== Alert Page ===== */
.alert-card{background:#FEF5E7;border:1px solid #FCEBBF;border-radius:var(--radius-sm);padding:14px;margin:12px 14px;}

/* ===== AI Suggestion Page ===== */
.ai-card{background:linear-gradient(135deg,#FEF5E7,#FDEBD0);border-radius:var(--radius);margin:12px 14px;padding:16px;}
.ai-suggestion{background:var(--white);border-radius:10px;padding:14px;margin-top:10px;}

/* ===== Ecosystem Page ===== */
.eco-device{display:flex;align-items:center;gap:12px;padding:12px;background:var(--white);border-radius:10px;margin-bottom:8px;}
.eco-dot{width:8px;height:8px;border-radius:50%;background:var(--green);}

/* ===== Multi-user Page ===== */
.role-tag{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:700;}
.role-admin{background:var(--primary);color:#fff;}
.role-operator{background:#EBF5FB;color:var(--blue);}

/* ===== Subscription Page ===== */
.sub-switch{width:44px;height:26px;background:var(--accent);border-radius:13px;position:relative;cursor:pointer;}
.sub-switch::after{content:"";position:absolute;top:2px;right:2px;width:22px;height:22px;background:#fff;border-radius:50%;transition:.2s;}

/* ===== Toast ===== */
.toast{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);background:rgba(45,52,54,.82);color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;z-index:100;animation:toastIn .3s;backdrop-filter:blur(8px);}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,10px);}to{opacity:1;transform:translate(-50%,0);}}

/* SVG */
svg{display:block;}

.content{scrollbar-width:none;}

/* Right Panel */
.desc-panel{padding:24px 20px;}
.dp-level{display:inline-flex;align-items:center;gap:6px;margin-bottom:8px;}
.dp-module{font-size:12px;color:var(--text-secondary);}
.dp-title{font-size:20px;font-weight:700;color:var(--primary);margin-bottom:4px;line-height:1.3;}
.dp-hr{height:2px;background:var(--accent);width:40px;margin:12px 0 16px;border-radius:1px;}
.dp-section{margin-bottom:16px;}
.dp-label{font-size:12px;font-weight:700;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px;}
.dp-text{font-size:13px;color:var(--text);line-height:1.6;}
.dp-list{font-size:13px;color:var(--text);line-height:1.8;list-style:none;}
.dp-list li{padding-left:14px;position:relative;}
.dp-list li::before{content:"\2022";color:var(--accent);position:absolute;left:0;font-weight:700;}
.dp-diff{background:#F8F6F1;border:1px solid var(--line);border-left:3px solid var(--red);border-radius:8px;padding:12px;font-size:12px;line-height:1.6;}
.dp-diff strong{color:var(--red);}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar-left">
    <div class="logo">NutriSmart Demo <small>Formula Maker \u00b7 Interactive Prototype \u00b7 Western UI</small></div>
    <nav class="tree" id="tree"></nav>
  </aside>
  <main class="stage">
    <div class="iphone-wrap" id="iphoneWrap">
      <div class="iphone">
        <div class="notch"></div>
        <div class="screen" id="screen"></div>
        <div class="home-indicator"></div>
      </div>
    </div>
  </main>
  <aside class="sidebar-right">
    <div class="desc-panel" id="descPanel"></div>
  </aside>
</div>

<script>
// ===== Color Constants =====
const C = {
  primary:'#2D3436', accent:'#8B6914', accentLight:'#C4A35A',
  bg:'#FDF8F3', text:'#2D3436', white:'#FFF',
  green:'#27AE60', red:'#E74C3C', orange:'#E67E22',
  blue:'#2980B9', textSecondary:'#636E72', line:'#E8E2DA'
};

// ===== Status Bar =====
function statusBar(){
  return `<div class="status-bar">
    <span>9:41</span>
    <div class="sb-right">

// ===== Nav Bar =====
function navBar(title, opts={}){
  const back = opts.back ? `<div class="nav-back" data-goto="${opts.backTarget||'p0'}">\u2039</div>` : '<div style="width:36px"></div>';
  const right = opts.right ? `<div class="nav-right">${opts.right}</div>` : '<div style="width:36px"></div>';
  return `<div class="nav-bar">${back}<div class="nav-title">${title}</div>${right}</div>`;
}

// ===== Toast =====
let toastTimer;
function showToast(msg){
  const old = document.querySelector('.toast');
  if(old) old.remove();
  clearTimeout(toastTimer);
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.getElementById('screen').appendChild(t);
  toastTimer = setTimeout(()=>t.remove(),2200);
}

// ===== Ring SVG =====
function ringSVG(percent, size=64, stroke=6, color=C.accent, bg='#E8E2D8'){
  const r = (size-stroke)/2;
  const circ = 2*Math.PI*r;
  const off = circ*(1-percent/100);
  return `<svg width="${size}" height="${size}" style="flex-shrink:0">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${bg}" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="50%" y="50%" text-anchor="middle" dy=".35em" font-size="${size*.22}" font-weight="700" fill="${C.primary}">${percent}%</text>
  </svg>`;
}

    <div class="dp-level">

// ===== Left Sidebar Tree =====
function renderTree(){
  const modules = {};
  Object.entries(PAGES).forEach(([id,p])=>{
    if(!modules[p.module]) modules[p.module] = [];
    modules[p.module].push({id,...p});
  });
  const tree = document.getElementById('tree');
  let html = '';
  Object.entries(modules).forEach(([mod,items])=>{
    html += `<div class="tree-module"><div class="tree-module-title">${mod}</div>`;
    items.forEach((it,i)=>{
      html += `<div class="tree-item" data-page="${it.id}" onclick="switchPage('${it.id}')">
        <span class="tree-num">${String(i+1).padStart(2,'0')}</span>
        <span style="flex:1">${it.title}</span>
        <span class="tree-tag ${it.tagClass}">${it.levelTag}</span>
      </div>`;
    });
    html += '</div>';
  });
  tree.innerHTML = html;
}

// ===== Current Page =====
let currentPage = 'p0';

// ===== Switch Page =====
function switchPage(id){
  const p = PAGES[id];
  if(!p) return;
  currentPage = id;
  const screen = document.getElementById('screen');
  screen.innerHTML = statusBar() + p.render();
  document.getElementById('descPanel').innerHTML = descTemplate(p);
  document.querySelectorAll('.tree-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.page===id);
  });
  const content = screen.querySelector('.content');
  if(content) content.scrollTop = 0;
  if(id==='p2') bindBrew();
  if(id==='p3') bindScan();
}

// ===== P2 Brew Animation =====
function bindBrew(){
  const startBtn = document.getElementById('brewStart');
  if(!startBtn) return;
  startBtn.onclick = ()=>{
    const content = document.getElementById('brewContent');
    content.innerHTML = `
      <div class="brew-anim" style="min-height:400px">
        <div class="brew-ring">
          <svg width="160" height="160" viewBox="0 0 160 160">
            <circle class="brew-ring-bg" cx="80" cy="80" r="70"/>
            <circle class="brew-ring-fg" id="brewRingFg" cx="80" cy="80" r="70" stroke-dasharray="439.8" stroke-dashoffset="439.8"/>
          </svg>
          <div class="brew-ring-text"><div class="g" id="brewWeight">0.0g</div><div class="l">Weighing...</div></div>
        </div>
        <div style="font-size:14px;font-weight:600;color:${C.primary};margin-bottom:6px">Calibrating Weight...</div>
        <div style="font-size:12px;color:${C.textSecondary}">Target 23.4g (4oz \u00b7 4.3g/oz)</div>
        <div style="margin-top:12px;font-size:13px;color:${C.green}">Live Deviation <strong id="brewDev">+0.0%</strong> \u2713</div>
        <div style="margin-top:16px;font-size:12px;color:${C.textSecondary}">Temp 104\u00b0F \u00b7 System OK</div>
      </div>
    `;
    let progress = 0, weight = 0;
    const ring = document.getElementById('brewRingFg');
    const wEl = document.getElementById('brewWeight');
    const dEl = document.getElementById('brewDev');
    const circ = 2*Math.PI*70;
    const interval = setInterval(()=>{
      progress += 4;
      weight = (progress/100)*23.4;
      if(progress<=100){
        ring.style.strokeDashoffset = circ*(1-progress/100);
        wEl.textContent = weight.toFixed(1)+'g';
        const dev = (progress/100*1.2).toFixed(1);
        dEl.textContent = '+'+dev+'%';
      }
      if(progress>=100){
        clearInterval(interval);
        setTimeout(()=>{
          content.innerHTML = `
            <div class="brew-done" style="min-height:400px">
              <div class="brew-done-check">\u2713</div>
              <div style="font-size:18px;font-weight:700;color:${C.primary};margin-bottom:8px">Bottle Ready!</div>
              <div style="font-size:14px;color:${C.text};margin-bottom:4px">4.0oz / 104\u00b0F / Kabrita Goat</div>
              <div style="font-size:13px;color:${C.green};margin-bottom:4px">Deviation +1.2% \u2713 Within tolerance</div>
              <div style="font-size:12px;color:${C.textSecondary};margin-bottom:24px">Logged to today's feeding record</div>
              <div class="btn btn-accent btn-block" style="max-width:200px" onclick="switchPage('p1')">Done</div>
            </div>
          `;
        },600);
      }
    },80);
  };
}

// ===== Event Delegation =====
document.getElementById('screen').addEventListener('click', (e)=>{
  const goto = e.target.closest('[data-goto]');
  if(goto){
    e.stopPropagation();
    switchPage(goto.dataset.goto);
    return;
  }
  const action = e.target.closest('[data-action]');
  if(action){
    e.stopPropagation();
    e.preventDefault();
    const a = action.dataset.action;
    const msgs = {
      addDevice:'Scanning for nearby devices...',
      lock:'Child lock toggled',
      volUp:'Volume increased',
      volDown:'Volume decreased',
      power:'Power cycling device...',
      order:'Ordered! Kabrita Stage 1 \u00b7 1 Can arriving in 2 days',
      export:'Exporting PDF \u2014 will be sent to sarah@email.com',
      share:'\u2705 Link copied to clipboard',
      adopt:'Preset updated! Single serving adjusted to 5oz',
      remind:'Reminder set: Notify when Emma turns 6 months',
      reaction:'Reaction saved to profile',
      growth:'Data entry form: Date / Weight / Height',
      fhir:'FHIR standard report exporting... ready to send to pediatrician',
      toggle:'Setting updated',
      modify:'Plan modification dialog opened',
      cancel:'Subscription paused. Resume anytime.',
      photo:'Photo ID: Take a photo of the can label \u2014 OCR + image matching, cloud response in 24h'
    };
    if(msgs[a]) showToast(msgs[a]);
  }
});

// ===== iPhone Scale =====
function fitIphone(){
  const stage = document.querySelector('.stage');
  const wrap = document.getElementById('iphoneWrap');
  const sw = stage.clientWidth - 40;
  const sh = stage.clientHeight - 40;
  const scale = Math.min(1, sw/375, sh/760);
  wrap.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', fitIphone);

// ===== Init =====
renderTree();
switchPage('p0');
fitIphone();
</script>
