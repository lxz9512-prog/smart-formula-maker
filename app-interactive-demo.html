<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NutriSmart 智能调奶器 App 交互 Demo</title>
<style>
/* ===== Reset ===== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:"PingFang SC","Helvetica Neue",Arial,sans-serif;font-size:14px;color:#333;overflow:hidden;}

/* ===== 配色变量 ===== */
:root{
  --primary:#1A3A5C; --accent:#E87A2E; --bg:#F5F5F5; --text:#333333;
  --white:#FFFFFF; --green:#2E8B57; --red:#C0392B; --blue2:#3A5A7C;
  --lightblue:#CCDDEE; --gray:#999999; --line:#E5E5E5;
}

/* ===== 三栏布局 ===== */
.app{display:grid;grid-template-columns:280px 1fr 360px;height:100vh;min-width:1200px;background:#ECECEC;}
.sidebar-left{background:var(--primary);color:#fff;overflow-y:auto;}
.stage{display:flex;align-items:center;justify-content:center;background:#E8E8E8;overflow:hidden;position:relative;}
.sidebar-right{background:#fff;border-left:1px solid var(--line);overflow-y:auto;}

/* ===== 左栏 ===== */
.logo{padding:20px 20px 16px;font-size:17px;font-weight:700;color:var(--accent);border-bottom:1px solid var(--blue2);position:sticky;top:0;background:var(--primary);z-index:5;}
.logo small{display:block;font-size:11px;color:var(--lightblue);font-weight:400;margin-top:2px;}
.tree{padding:8px 0;}
.tree-module{margin-top:8px;}
.tree-module-title{padding:8px 20px 4px;font-size:11px;color:var(--lightblue);font-weight:600;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;user-select:none;}
.tree-item{padding:9px 20px 9px 28px;font-size:13px;color:#DDE4EE;cursor:pointer;display:flex;align-items:center;gap:8px;border-left:3px solid transparent;transition:background .15s;}
.tree-item:hover{background:rgba(255,255,255,.06);}
.tree-item.active{background:rgba(232,122,46,.15);border-left-color:var(--accent);color:#fff;font-weight:600;}
.tree-num{font-size:10px;color:var(--gray);width:16px;}
.tree-tag{font-size:9px;padding:1px 5px;border-radius:8px;font-weight:600;}
.tag-l1{background:#555;color:#fff;}
.tag-l2{background:#3A5A7C;color:#fff;}
.tag-l3{background:var(--primary);color:#fff;}
.tag-l4{background:var(--accent);color:#fff;}
.tag-l5{background:linear-gradient(90deg,#E87A2E,#C0392B);color:#fff;}

/* ===== iPhone 边框 ===== */
.iphone-wrap{transform-origin:center center;}
.iphone{width:375px;height:760px;background:#1a1a1a;border-radius:48px;padding:12px;box-shadow:0 0 0 2px #2a2a2a,0 30px 70px rgba(0,0,0,.4),inset 0 0 4px rgba(255,255,255,.08);position:relative;}
.screen{width:100%;height:100%;background:var(--bg);border-radius:38px;overflow:hidden;position:relative;display:flex;flex-direction:column;}
.notch{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:150px;height:26px;background:#1a1a1a;border-radius:0 0 18px 18px;z-index:50;}
.home-indicator{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);width:130px;height:5px;background:rgba(255,255,255,.5);border-radius:3px;z-index:50;}

/* ===== 屏幕内通用 ===== */
.status-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 28px 0 32px;font-size:13px;font-weight:600;color:#000;flex-shrink:0;z-index:10;position:relative;}
.status-bar .sb-right{display:flex;align-items:center;gap:5px;}
.sb-icon{width:16px;height:11px;}
.nav-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--primary);color:#fff;flex-shrink:0;}
.nav-bar .nav-title{font-size:16px;font-weight:600;}
.nav-bar .nav-back{font-size:20px;cursor:pointer;width:30px;}
.nav-bar .nav-right{font-size:13px;cursor:pointer;width:30px;text-align:right;}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.content::-webkit-scrollbar{width:0;}

/* ===== Tab Bar ===== */
.tab-bar{height:73px;display:flex;align-items:flex-start;justify-content:space-around;padding-top:8px;background:rgba(255,255,255,.96);border-top:1px solid var(--line);flex-shrink:0;}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--gray);cursor:pointer;width:60px;}
.tab.active{color:var(--primary);}
.tab-icon{font-size:20px;line-height:1;}
.tab-mid{position:relative;margin-top:-18px;}
.tab-mid-circle{width:48px;height:48px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:300;box-shadow:0 4px 12px rgba(232,122,46,.4);border:4px solid #fff;}
.tab-mid.active .tab-mid-circle{background:var(--accent);}

/* ===== App 内通用组件 ===== */
.card{background:#fff;border-radius:14px;margin:12px 14px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.card-dark{background:var(--primary);color:#fff;}
.card-accent{background:#FFF3E8;border:1px solid #F5D9C0;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border-radius:22px;font-size:14px;font-weight:600;cursor:pointer;border:none;}
.btn-accent{background:var(--accent);color:#fff;}
-btn-primary{background:var(--primary);color:#fff;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--accent);color:var(--accent);}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:16px;}
.btn-block{display:block;width:100%;}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;}
.pill-blue{background:#E8EFF7;color:var(--primary);}
.pill-orange{background:#FFF3E8;color:var(--accent);}
.pill-green{background:#E8F5EE;color:var(--green);}
.pill-red{background:#FBE9E7;color:var(--red);}
.pill-beta{background:var(--accent);color:#fff;}
.section-title{font-size:12px;color:var(--gray);font-weight:600;padding:12px 16px 4px;text-transform:uppercase;letter-spacing:.3px;}
.row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;}
.divider{height:1px;background:var(--line);margin:8px 0;}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#fff;border-bottom:1px solid #F0F0F0;}
.list-item:last-child{border-bottom:none;}

/* ===== 右栏 ===== */
.desc-panel{padding:24px 22px;}
.dp-level{display:inline-flex;align-items:center;gap:6px;margin-bottom:8px;}
.dp-module{font-size:12px;color:var(--gray);}
.dp-title{font-size:20px;font-weight:700;color:var(--primary);margin-bottom:4px;line-height:1.3;}
.dp-hr{height:2px;background:var(--accent);width:40px;margin:12px 0 16px;border-radius:1px;}
.dp-section{margin-bottom:16px;}
.dp-label{font-size:12px;font-weight:700;color:var(--blue2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px;}
.dp-text{font-size:13px;color:var(--text);line-height:1.6;}
.dp-list{font-size:13px;color:var(--text);line-height:1.8;list-style:none;}
.dp-list li{padding-left:14px;position:relative;}
.dp-list li::before{content:"•";color:var(--accent);position:absolute;left:0;font-weight:700;}
.dp-diff{background:#F8FAFC;border:1px solid var(--line);border-left:3px solid var(--red);border-radius:8px;padding:12px;font-size:12px;line-height:1.6;}
.dp-diff strong{color:var(--red);}

/* ===== 各页面专用样式 ===== */
/* P1 Dashboard */
.dash-greeting{padding:16px 16px 8px;}
.dash-overview{background:var(--primary);border-radius:16px;margin:0 14px;padding:16px;color:#fff;}
.dash-overview .big{font-size:28px;font-weight:700;}
.dash-overview .sub{font-size:12px;color:var(--lightblue);margin-top:2px;}
.dash-fab{display:flex;align-items:center;gap:14px;padding:16px 14px;}
.dash-fab-btn{width:72px;height:72px;border-radius:50%;background:var(--accent);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:600;box-shadow:0 4px 16px rgba(232,122,46,.35);cursor:pointer;flex-shrink:0;}
.dash-fab-btn span{font-size:22px;line-height:1;}
.ring-small{width:48px;height:48px;}
.dash-timeline-item{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:12px;}
.dash-timeline-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* P2 出奶 */
.brew-step{font-size:12px;color:var(--gray);padding:14px 16px 4px;font-weight:600;}
.brew-preset{display:flex;gap:10px;padding:0 14px;overflow-x:auto;}
.brew-preset-card{min-width:110px;background:#fff;border-radius:12px;padding:14px;text-align:center;border:2px solid transparent;cursor:pointer;}
.brew-preset-card.sel{border-color:var(--accent);background:#FFF8F2;}
.brew-preset-card .oz{font-size:22px;font-weight:700;color:var(--primary);}
.brew-confirm{padding:20px 14px;}
.brew-param{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px solid #F0F0F0;}
.brew-anim{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;text-align:center;}
.brew-ring{width:160px;height:160px;position:relative;margin-bottom:16px;}
.brew-ring-bg{fill:none;stroke:#E5E5E5;stroke-width:8;}
.brew-ring-fg{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset .3s;}
.brew-ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.brew-ring-text .g{font-size:24px;font-weight:700;color:var(--primary);}
.brew-ring-text .l{font-size:11px;color:var(--gray);}
.brew-done{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;}
.brew-done-check{width:80px;height:80px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:20px;}

/* P3 扫码 */
.scan-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a1a;position:relative;overflow:hidden;}
.scan-frame{width:220px;height:120px;border:2px solid var(--accent);border-radius:8px;position:relative;z-index:2;}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#E87A2E,transparent);animation:scanMove 2s ease-in-out infinite;z-index:3;}
@keyframes scanMove{0%,100%{top:0;}50%{top:calc(100% - 2px);}}
.scan-hint{color:#fff;font-size:13px;margin-top:20px;z-index:2;}
.scan-bottom{padding:16px;text-align:center;background:#1a1a1a;color:var(--accent);font-size:13px;cursor:pointer;}

/* P4 记录 */
.rec-day{font-size:13px;font-weight:700;color:var(--primary);padding:12px 16px 6px;}
.rec-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border-bottom:1px solid #F5F5F5;cursor:pointer;}
.rec-time{font-size:12px;color:var(--gray);width:42px;flex-shrink:0;}
.rec-amount{font-size:15px;font-weight:600;color:var(--primary);width:50px;}
.rec-dev{font-size:11px;flex:1;}
.rec-badge{font-size:10px;padding:2px 6px;border-radius:8px;}

/* P5 库存 */
.inv-ring-wrap{display:flex;align-items:center;gap:16px;}
.inv-bar{display:flex;align-items:flex-end;gap:6px;height:60px;padding:0 4px;}
.inv-bar-col{flex:1;background:var(--accent);border-radius:3px 3px 0 0;opacity:.7;min-height:4px;}

/* P6 生长曲线 */
.growth-seg{display:flex;margin:0 14px;background:#EBEBEB;border-radius:8px;padding:2px;}
.growth-seg-item{flex:1;text-align:center;padding:7px;font-size:12px;color:var(--gray);border-radius:6px;cursor:pointer;}
.growth-seg-item.sel{background:#fff;color:var(--primary);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08);}

/* P7 偏差报告 */
.dev-bar{display:flex;align-items:center;gap:6px;height:80px;}
.dev-bar-col{flex:1;border-radius:3px 3px 0 0;min-height:6px;position:relative;}
.dev-bar-val{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--gray);}

/* P8 预警 */
.alert-card{background:#FFF3E8;border:1px solid #F5D9C0;border-radius:12px;padding:14px;margin:12px 14px;}

/* P9 AI建议 */
.ai-card{background:linear-gradient(135deg,#FFF3E8,#FFE8D6);border-radius:14px;margin:12px 14px;padding:16px;}
.ai-suggestion{background:#fff;border-radius:10px;padding:14px;margin-top:10px;}

/* P12 生态 */
.eco-device{display:flex;align-items:center;gap:12px;padding:12px;background:#fff;border-radius:10px;margin-bottom:8px;}
.eco-dot{width:8px;height:8px;border-radius:50%;background:var(--green);}

/* P11 多用户 */
.role-tag{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600;}
.role-admin{background:var(--primary);color:#fff;}
.role-operator{background:#E8EFF7;color:var(--blue2);}

/* P13 订阅 */
.sub-switch{width:44px;height:26px;background:var(--accent);border-radius:13px;position:relative;cursor:pointer;}
.sub-switch::after{content:"";position:absolute;top:2px;right:2px;width:22px;height:22px;background:#fff;border-radius:50%;transition:.2s;}

/* Toast */
.toast{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.78);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:100;animation:toastIn .3s;}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,10px);}to{opacity:1;transform:translate(-50%,0);}}

/* SVG 通用 */
svg{display:block;}

/* 隐藏滚动条美化 */
.content{scrollbar-width:none;}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar-left">
    <div class="logo">NutriSmart App Demo<small>智能调奶器 · 交互原型 · 14 页</small></div>
    <nav class="tree" id="tree"></nav>
  </aside>
  <main class="stage">
    <div class="iphone-wrap" id="iphoneWrap">
      <div class="iphone">
        <div class="notch"></div>
        <div class="screen" id="screen"></div>
        <div class="home-indicator"></div>
      </div>
    </div>
  </main>
  <aside class="sidebar-right">
    <div class="desc-panel" id="descPanel"></div>
  </aside>
</div>

<script>
// ===== 配色常量 =====
const C = {primary:'#1A3A5C',accent:'#E87A2E',bg:'#F5F5F5',text:'#333',white:'#fff',green:'#2E8B57',red:'#C0392B',blue2:'#3A5A7C',lightblue:'#CCDDEE',gray:'#999',line:'#E5E5E5'};

// ===== 状态栏 =====
function statusBar(){
  return `<div class="status-bar">
    <span>9:41</span>
    <div class="sb-right">
      <svg class="sb-icon" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx=".5"/><rect x="5" y="5" width="3" height="7" rx=".5"/><rect x="10" y="2" width="3" height="10" rx=".5"/><rect x="15" y="0" width="3" height="12" rx=".5"/></svg>
      <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor"><path d="M7.5 0C4.6 0 1.9 1 0 2.7l1.3 1.4C2.9 2.7 5.1 1.9 7.5 1.9s4.6.8 6.2 2.2L15 2.7C13.1 1 10.4 0 7.5 0zm0 3.8c-1.9 0-3.6.6-4.9 1.6l1.3 1.4c1-.8 2.2-1.2 3.6-1.2s2.6.4 3.6 1.2l1.3-1.4C11.1 4.4 9.4 3.8 7.5 3.8zM7.5 7.6c-.9 0-1.7.3-2.3.8l2.3 2.6 2.3-2.6c-.6-.5-1.4-.8-2.3-.8z"/></svg>
      <svg width="24" height="11" viewBox="0 0 24 11"><rect x="0" y="0" width="21" height="11" rx="2.5" fill="none" stroke="currentColor" stroke-width="1" opacity=".4"/><rect x="22" y="3.5" width="2" height="4" rx="1" fill="currentColor" opacity=".4"/><rect x="2" y="2" width="16" height="7" rx="1.5" fill="currentColor"/></svg>
    </div>
  </div>`;
}

// ===== 导航栏 =====
function navBar(title, opts={}){
  const back = opts.back ? `<div class="nav-back" onclick="history.back()">‹</div>` : '<div style="width:30px"></div>';
  const right = opts.right ? `<div class="nav-right">${opts.right}</div>` : '<div style="width:30px"></div>';
  return `<div class="nav-bar">${back}<div class="nav-title">${title}</div>${right}</div>`;
}

// ===== Tab Bar =====
function tabBar(active){
  const tabs = [
    {id:'home',icon:'⌂',label:'首页',page:'p1'},
    {id:'record',icon:'☰',label:'记录',page:'p4'},
    {id:'brew',icon:'+',label:'',mid:true,page:'p2'},
    {id:'insight',icon:'◐',label:'洞察',page:'p6'},
    {id:'me',icon:'☺',label:'我的',page:'p14'},
  ];
  let h = '<div class="tab-bar">';
  tabs.forEach(t=>{
    const cls = active===t.id?'active':'';
    if(t.mid){
      h += `<div class="tab tab-mid ${cls}" data-goto="${t.page}"><div class="tab-mid-circle">+</div><span style="margin-top:2px;color:${C.gray}">出奶</span></div>`;
    } else {
      h += `<div class="tab ${cls}" data-goto="${t.page}"><span class="tab-icon">${t.icon}</span><span>${t.label}</span></div>`;
    }
  });
  h += '</div>';
  return h;
}

// ===== Toast =====
let toastTimer;
function showToast(msg){
  const old = document.querySelector('.toast');
  if(old) old.remove();
  clearTimeout(toastTimer);
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.getElementById('screen').appendChild(t);
  toastTimer = setTimeout(()=>t.remove(),2000);
}

// ===== 环形进度 SVG =====
function ringSVG(percent, size=64, stroke=6, color=C.accent, bg='#E5E5E5'){
  const r = (size-stroke)/2;
  const circ = 2*Math.PI*r;
  const off = circ*(1-percent/100);
  return `<svg width="${size}" height="${size}" class="ring-small">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${bg}" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="50%" y="50%" text-anchor="middle" dy=".35em" font-size="${size*.22}" font-weight="700" fill="${C.primary}">${percent}%</text>
  </svg>`;
}

// ===== 14 个页面定义 =====
const PAGES = {
  p1:{
    module:'核心喂养',title:'首页 Dashboard',level:'L1-L3',levelTag:'L1-L3',tagClass:'tag-l3',tab:'home',
    desc:{
      scene:'夜间3AM喂养 / 日常概览',
      func:'今日喂养概览、快捷出奶入口、库存状态、AI 建议直达，一屏掌握喂养全局',
      interactions:['一键出奶圆按钮 → P2 出奶流程','库存卡 → P5 库存管理','AI 建议条 → P9 AI 喂养建议','底部 Tab → P4/P6/P14'],
      diff:'Baby Brezza App 无主页概览，仅远程遥控；本方案以数据洞察驱动决策，AI 建议主动推送而非被动操作'
    },
    render:()=>`
      ${navBar('',{right:'🔔 ⚙️'})}
      <div class="content" style="background:${C.bg}">
        <div class="dash-greeting">
          <div style="font-size:13px;color:${C.gray}">Sarah，下午好 👋</div>
          <div style="font-size:18px;font-weight:700;color:${C.primary}">Emma 的喂养日</div>
        </div>
        <div class="dash-overview">
          <div style="display:flex;justify-content:space-between;align-items:flex-end">
            <div><div class="big">32oz</div><div class="sub">今日已喂养 6 次</div></div>
            <div style="text-align:right"><div style="font-size:12px;color:${C.lightblue}">距下次约</div><div style="font-size:18px;font-weight:600">1h20m</div></div>
          </div>
          <div style="height:1px;background:rgba(255,255,255,.15);margin:12px 0"></div>
          <div style="font-size:12px;color:${C.lightblue}">上瓶 14:30 · 4oz · Similac 1段 · 偏差 +1.2% ✓</div>
        </div>
        <div class="dash-fab">
          <div class="dash-fab-btn" data-goto="p2"><span>+</span>一键出奶</div>
          <div style="flex:1">
            <div style="font-size:12px;color:${C.gray};margin-bottom:4px">奶粉库存</div>
            <div class="card" style="margin:0;padding:10px;display:flex;align-items:center;gap:10px;cursor:pointer" data-goto="p5">
              ${ringSVG(68,48)}
              <div style="flex:1">
                <div style="font-size:13px;font-weight:600;color:${C.primary}">Similac 1段</div>
                <div style="font-size:11px;color:${C.gray}">余量 68% · 约 5.2 天</div>
              </div>
              <div class="btn btn-accent btn-sm">补货</div>
            </div>

// ===== 左栏目录树渲染 =====
function renderTree(){
  const modules = {};
  Object.entries(PAGES).forEach(([id,p])=>{
    if(!modules[p.module]) modules[p.module] = [];
    modules[p.module].push({id,...p});
  });
  const tree = document.getElementById('tree');
  let html = '';
  Object.entries(modules).forEach(([mod,items])=>{
    html += `<div class="tree-module"><div class="tree-module-title">${mod}</div>`;
    items.forEach((it,i)=>{
      html += `<div class="tree-item" data-page="${it.id}" onclick="switchPage('${it.id}')">
        <span class="tree-num">${String(i+1).padStart(2,'0')}</span>
        <span style="flex:1">${it.title}</span>
        <span class="tree-tag ${it.tagClass}">${it.levelTag}</span>
      </div>`;
    });
    html += '</div>';
  });
  tree.innerHTML = html;
}

// ===== 当前页面 =====
let currentPage = 'p1';

// ===== 切换页面 =====
function switchPage(id){
  const p = PAGES[id];
  if(!p) return;
  currentPage = id;
  const screen = document.getElementById('screen');
  screen.innerHTML = statusBar() + p.render() + (p.tab ? tabBar(p.tab) : '');
  document.getElementById('descPanel').innerHTML = descTemplate(p);
  document.querySelectorAll('.tree-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.page===id);
  });
  // 滚动到顶部
  const content = screen.querySelector('.content');
  if(content) content.scrollTop = 0;
  // 绑定出奶动画
  if(id==='p2') bindBrew();
  if(id==='p3') bindScan();
}

    // 阶段3: 出奶动画
    content.innerHTML = `
      <div class="brew-anim" style="min-height:400px">
        <div class="brew-ring">
          <svg width="160" height="160" viewBox="0 0 160 160">
            <circle class="brew-ring-bg" cx="80" cy="80" r="70"/>

          <div class="brew-ring-text"><div class="g" id="brewWeight">0.0g</div><div class="l">称重中</div></div>
        </div>
        <div style="font-size:14px;font-weight:600;color:${C.primary};margin-bottom:6px">称重校准中…</div>

        <div style="margin-top:16px;font-size:12px;color:${C.gray}">温度 98°F · 状态正常</div>
      </div>
    `;
    let progress = 0, weight = 0;
    const ring = document.getElementById('brewRingFg');
    const wEl = document.getElementById('brewWeight');
    const dEl = document.getElementById('brewDev');
    const circ = 2*Math.PI*70;
    const interval = setInterval(()=>{
      progress += 4;
      weight = (progress/100)*23.4;
      if(progress<=100){
        ring.style.strokeDashoffset = circ*(1-progress/100);
        wEl.textContent = weight.toFixed(1)+'g';
        const dev = (progress/100*1.2).toFixed(1);
        dEl.textContent = '+'+dev+'%';
      }
      if(progress>=100){
        clearInterval(interval);
        setTimeout(()=>{
          content.innerHTML = `
            <div class="brew-done" style="min-height:400px">
              <div class="brew-done-check">✓</div>
              <div style="font-size:18px;font-weight:700;color:${C.primary};margin-bottom:8px">出奶完成</div>

    if(msgs[a]) showToast(msgs[a]);
  }
});

// ===== iPhone 自适应缩放 =====
function fitIphone(){
  const stage = document.querySelector('.stage');
  const wrap = document.getElementById('iphoneWrap');
  const sw = stage.clientWidth - 40;
  const sh = stage.clientHeight - 40;
  const scale = Math.min(1, sw/375, sh/760);
  wrap.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', fitIphone);

// ===== 初始化 =====
renderTree();
switchPage('p1');
fitIphone();
</script>
